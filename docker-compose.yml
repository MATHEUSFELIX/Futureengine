services:
  api:
    build: .
    container_name: future_engine_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app

  ui:
    build: .
    container_name: future_engine_ui
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    volumes:
      - ./:/app
